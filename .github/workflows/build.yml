name: Build NoLED APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Project Structure
        run: flutter create --platforms android .

      - name: Inject Lock Screen Permissions
        run: |
          sed -i 's/<activity/<activity android:showWhenLocked="true" android:turnScreenOn="true" android:keepScreenOn="true"/g' android/app/src/main/AndroidManifest.xml

      - name: Inject Packages into Overwritten Pubspec
        run: |
          flutter pub add shared_preferences
          flutter pub add installed_apps
          flutter pub add battery_plus

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noled-app
          path: build/app/outputs/flutter-apk/app-release.apk
