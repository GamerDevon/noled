name: Build NoLED APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Project Structure
        run: flutter create --platforms android --no-overwrite --org com.noled .

      - name: Inject Complete AndroidManifest Configurations
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          cat << 'EOF' > $MANIFEST_PATH
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android:permission.WAKE_LOCK"/>
              <uses-permission android:name="android:permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android:permission.BIND_NOTIFICATION_LISTENER_SERVICE"/>
              <uses-permission android:name="android:permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android:permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>
              
              <application
                  android:label="noled"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:showWhenLocked="true"
                      android:turnScreenOn="true"
                      android:keepScreenOn="true">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  
                  <service 
                      android:name=".NotificationReceiver" 
                      android:label="NoLED Listener" 
                      android:permission="android:permission.BIND_NOTIFICATION_LISTENER_SERVICE" 
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.service.notification.NotificationListenerService"/>
                      </intent-filter>
                  </service>
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Inject Native Android Notification Listener Service (Kotlin)
        run: |
          KOTLIN_DIR="android/app/src/main/kotlin/com/noled/noled"
          mkdir -p $KOTLIN_DIR
          
          cat << 'EOF' > $KOTLIN_DIR/NotificationReceiver.kt
          package com.noled.noled

          import android.content.Context
          import android.content.Intent
          import android.os.PowerManager
          import android.service.notification.NotificationListenerService
          import android.service.notification.StatusBarNotification

          class NotificationReceiver : NotificationListenerService() {
              override fun onNotificationPosted(sbn: StatusBarNotification?) {
                  super.onNotificationPosted(sbn)
                  val packageName = sbn?.packageName ?: return
                  
                  if (packageName == "android" || sbn.isOngoing) return

                  val prefs = getSharedPreferences("FlutterSharedPreferences", Context.MODE_PRIVATE)
                  val isEnabled = prefs.getBoolean("flutter.$packageName", false)
                  
                  if (isEnabled) {
                      val pm = getSystemService(Context.POWER_SERVICE) as PowerManager
                      val wakeLock = pm.newWakeLock(
                          PowerManager.SCREEN_BRIGHT_WAKE_LOCK or PowerManager.ACQUIRE_CAUSES_WAKEUP,
                          "NoLED::NotificationWakeLock"
                      )
                      wakeLock.acquire(3000)

                      val launchIntent = packageManager.getLaunchIntentForPackage(this.packageName)
                      launchIntent?.apply {
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_REORDER_TO_FRONT)
                          putExtra("triggered_package", packageName)
                          startActivity(this)
                      }
                      
                      MainActivity.sendNotificationSignal(packageName)
                  }
              }
          }
          EOF

          cat << 'EOF' > $KOTLIN_DIR/MainActivity.kt
          package com.noled.noled

          import android.content.Context
          import android.content.Intent
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.provider.Settings
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.plugin.common.MethodChannel

          class MainActivity: FlutterActivity() {
              companion object {
                  var channel: MethodChannel? = null
                  fun sendNotificationSignal(packageName: String) {
                      channel?.invokeMethod("showNotificationOverlay", packageName)
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val flutterEngine = flutterEngine ?: return
                  channel = MethodChannel(flutterEngine.dartExecutor.binaryMessenger, "com.noled.app/overlay")
                  
                  channel?.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "checkOverlayPermission" -> {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                                  result.success(Settings.canDrawOverlays(this))
                              } else {
                                  result.success(true)
                              }
                          }
                          "requestOverlayPermission" -> {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                                  val intent = Intent(
                                      Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                      Uri.parse("package:$packageName")
                                  )
                                  startActivity(intent)
                              }
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }

                  intent.getStringExtra("triggered_package")?.let { pkg ->
                      sendNotificationSignal(pkg)
                  }
              }
          }
          EOF

      - name: Add Permission Handler Dependency
        run: flutter pub add permission_handler

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noled-app
          path: build/app/outputs/flutter-apk/app-release.apk
