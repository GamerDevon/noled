name: Build NoLED APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Project Structure
        run: flutter create --platforms android --no-overwrite --org com.noled .

      - name: Inject Overlay and System Wake Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \    <uses-permission android:name="android:permission.WAKE_LOCK"\/>' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android:permission.SYSTEM_ALERT_WINDOW"\/>' $MANIFEST_PATH
          
          sed -i 's/<activity/<activity android:showWhenLocked="true" android:turnScreenOn="true" android:keepScreenOn="true"/g' $MANIFEST_PATH
          
          SERVICE_TAG="<service android:name=\".NotificationReceiver\" android:label=\"NoLED Listener\" android:permission=\"android:permission.BIND_NOTIFICATION_LISTENER_SERVICE\" android:exported=\"true\"><intent-filter><action android:name=\"android.service.notification.NotificationListenerService\"\/><\/intent-filter><\/service>"
          sed -i "/<\/activity>/a \        $SERVICE_TAG" $MANIFEST_PATH

      - name: Inject Native Android Notification Listener Service (Kotlin)
        run: |
          KOTLIN_DIR="android/app/src/main/kotlin/com/noled/noled"
          mkdir -p $KOTLIN_DIR
          
          cat << 'EOF' > $KOTLIN_DIR/NotificationReceiver.kt
          package com.noled.noled

          import android.content.Context
          import android.content.Intent
          import android.os.PowerManager
          import android.service.notification.NotificationListenerService
          import android.service.notification.StatusBarNotification

          class NotificationReceiver : NotificationListenerService() {
              override fun onNotificationPosted(sbn: StatusBarNotification?) {
                  super.onNotificationPosted(sbn)
                  val packageName = sbn?.packageName ?: return
                  
                  if (packageName == "android" || sbn.isOngoing) return

                  val prefs = getSharedPreferences("FlutterSharedPreferences", Context.MODE_PRIVATE)
                  val isEnabled = prefs.getBoolean("flutter.$packageName", false)
                  
                  if (isEnabled) {
                      val pm = getSystemService(Context.POWER_SERVICE) as PowerManager
                      val wakeLock = pm.newWakeLock(
                          PowerManager.SCREEN_BRIGHT_WAKE_LOCK or PowerManager.ACQUIRE_CAUSES_WAKEUP,
                          "NoLED::NotificationWakeLock"
                      )
                      wakeLock.acquire(3000)

                      val launchIntent = packageManager.getLaunchIntentForPackage(context.packageName)
                      launchIntent?.apply {
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_REORDER_TO_FRONT)
                          putExtra("triggered_package", packageName)
                          context.startActivity(this)
                      }
                      
                      MainActivity.sendNotificationSignal(packageName)
                  }
              }
          }
          EOF

          cat << 'EOF' > $KOTLIN_DIR/MainActivity.kt
          package com.noled.noled

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.plugin.common.MethodChannel

          class MainActivity: FlutterActivity() {
              companion object {
                  var channel: MethodChannel? = null
                  fun sendNotificationSignal(packageName: String) {
                      channel?.invokeMethod("showNotificationOverlay", packageName)
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val flutterEngine = flutterEngine ?: return
                  channel = MethodChannel(flutterEngine.dartExecutor.binaryMessenger, "com.noled.app/overlay")
                  
                  intent.getStringExtra("triggered_package")?.let { pkg ->
                      sendNotificationSignal(pkg)
                  }
              }
          }
          EOF

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noled-app
          path: build/app/outputs/flutter-apk/app-release.apk
